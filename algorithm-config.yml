algorithm_description: Run HLS Phenometrics
algorithm_name: hls-phenometrics # this is the algo name : algo_version
algorithm_version: main
build_command: HLS_phenometrics_maap/build-env.sh
disk_space: 64GB # test mem needed, up to 64GB
docker_container_url: mas.maap-project.org/root/maap-workspaces/custom_images/maap_base:v4.2.0
inputs:
  config: []
  file: []
  positional:
  - default: ''
    description: MGRS tile ID e.g. 18SUJ
    name: tile
    required: true
  - default: ''
    description: e.g. 2020
    name: target_year
    required: true
queue: maap-dps-worker-64gb
repository_url: https://github.com/CQuinn8/HLS_phenometrics_maap
run_command: HLS_phenometrics_maap/run.sh
imported_worker_files:
  $HOME/.netrc: /home/ops/.netrc
  /tmp:
    - /tmp
    - rw
